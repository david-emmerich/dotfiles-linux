# ==============================================================================
# Tmux Configuration
# ==============================================================================
# Symlink this to ~/.tmux.conf
# Install plugins: prefix + I (or run ~/.tmux/plugins/tpm/bin/install_plugins)

# ------------------------------------------------------------------------------
# General Settings
# ------------------------------------------------------------------------------

# Terminal colors (truecolor)
# tmux-256color needs `ncurses-term` on minimal Debian installs.
# The wildcard override enables truecolor for any 256-color outer terminal
# (xterm-256color, xterm-ghostty, …).
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:RGB"

# Mouse support
set-option -g mouse on

# Start windows and panes at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# Don't rename windows automatically
set-option -g allow-rename off

# Status bar position
set-option -g status-position top

# Faster escape sequences (for vim)
set -s escape-time 0

# Increase history limit
set -g history-limit 50000

# Refresh status more often
set -g status-interval 5

# ------------------------------------------------------------------------------
# Key Bindings
# ------------------------------------------------------------------------------

# Change prefix from C-b to F10
unbind C-b
set -g prefix F10
bind-key F10 send-prefix

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Clear screen with prefix + c
bind-key c send-keys 'clear' Enter

# ------------------------------------------------------------------------------
# Pane Management
# ------------------------------------------------------------------------------

# Split panes using j (horizontal) and l (vertical)
unbind '"'
unbind %
bind-key j split-window -v -c "#{pane_current_path}"
bind-key l split-window -h -c "#{pane_current_path}"

# Resize panes using J/K/H/L
bind-key -r J resize-pane -U 10
bind-key -r K resize-pane -D 10
bind-key -r H resize-pane -L 10
bind-key -r L resize-pane -R 10

# Toggle status bar
bind-key s set-option -g status

# ------------------------------------------------------------------------------
# Smart Pane Switching (vim-tmux-navigator style)
# ------------------------------------------------------------------------------

# Check if current pane is running vim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# Navigate between panes with C-h/j/k (vim-aware)
# C-l intentionally left unbound so it clears the terminal as usual
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'

# Same bindings for copy mode
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U

# ------------------------------------------------------------------------------
# Window Management
# ------------------------------------------------------------------------------

# Create new window in current directory
bind-key n new-window -c "#{pane_current_path}"

# Move windows left/right
bind-key -r < swap-window -t -1 \; select-window -t -1
bind-key -r > swap-window -t +1 \; select-window -t +1

# ------------------------------------------------------------------------------
# Plugins
# ------------------------------------------------------------------------------

set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-position top
set -g @tmux-dotbar-bg "#1F2329"
set -g @tmux-dotbar-fg-current "#E1782C"
set -g @tmux-dotbar-fg-session "#565B66"
set -g @tmux-dotbar-session-text " "

# Plugin Manager (must be last)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
